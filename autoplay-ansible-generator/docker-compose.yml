version: '3.8'

services:
  app_blue:
    image: autoplay-app:latest
    container_name: app_blue
    ports:
      - "8001:5000"
    volumes:
      - autoplay-db:/app/app/generated
      - ${AUTOPLAY_SSH_KEY_PATH:-/home/ec2-user/.ssh/temp_key}:/run/secrets/autoplay_ssh_key:ro
    environment:
      - GITHUB_PAT=${GITHUB_PAT}
      - AUTOPLAY_DEFAULT_SSH_KEY_PATH=/run/secrets/autoplay_ssh_key
    restart: unless-stopped

  app_green:
    image: autoplay-app:latest
    container_name: app_green
    ports:
      - "8002:5000"
    volumes:
      - autoplay-db:/app/app/generated
      - ${AUTOPLAY_SSH_KEY_PATH:-/home/ec2-user/.ssh/temp_key}:/run/secrets/autoplay_ssh_key:ro
    environment:
      - GITHUB_PAT=${GITHUB_PAT}
      - AUTOPLAY_DEFAULT_SSH_KEY_PATH=/run/secrets/autoplay_ssh_key
    restart: unless-stopped

  nginx_lb:
    image: nginx:alpine
    container_name: nginx_lb
    ports:
      - "5000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app_blue
      - app_green
    restart: unless-stopped

volumes:
  autoplay-db:
