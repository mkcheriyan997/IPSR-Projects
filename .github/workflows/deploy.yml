name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag python_docker_app:latest

    - name: Run Tests
      run: |
        docker run --rm python_docker_app:latest python manage.py test

    # Optional: You can add steps here to push to Docker Hub or deploy
    # if you provide the necessary secrets in GitHub repository settings.
