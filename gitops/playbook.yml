- name: AutoPlay Server Setup
  hosts: demo_target_group
  become: yes
  tasks:
    - name: Manage hosts entry for "app.internal app"
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '^127\.0\.0\.1\s+'
        line: "127.0.0.1 app.internal app"
        state: present
        backup: true
