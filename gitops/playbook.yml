- name: AutoPlay Server Setup 2
  hosts: 127.0.0.1
  become: yes
  tasks:
    - name: Ensure custom group "devops" exists
      ansible.builtin.group:
        name: "devops"
        state: present

    - name: Create system user "webadmin"
      ansible.builtin.user:
        name: "webadmin"
        shell: "/bin/bash"
        groups: "devops"
        append: yes
        state: present


