- name: AutoPlay Server Setup
  hosts: target_servers
  become: yes
  tasks:
    - name: Create managed directory "/opt/autoplay-data"
      ansible.builtin.file:
        path: "/opt/autoplay-data"
        state: directory
        owner: "root"
        group: "root"
        mode: "0755"

    - name: Write managed file "/tmp/autoplay-managed.txt"
      ansible.builtin.copy:
        dest: "/tmp/autoplay-managed.txt"
        mode: "0644"
        content: |
          Managed by AutoPlay

    - name: Checkout source repository into "/opt/application"
      ansible.builtin.git:
        repo: ""
        dest: "/opt/application"
        version: "main"
        update: true

    - name: Manage hosts entry for "app.internal app"
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '^127\.0\.0\.1\s+'
        line: "127.0.0.1 app.internal app"
        state: present
        backup: true
