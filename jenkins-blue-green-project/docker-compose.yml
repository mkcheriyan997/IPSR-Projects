services:
  app_blue:
    build: ./app
    container_name: app_blue
    environment:
      - APP_VERSION=${VERSION:-1.0}
      - APP_COLOR=blue
    ports:
      - "8001:8000"
    restart: always

  app_green:
    build: ./app
    container_name: app_green
    environment:
      - APP_VERSION=${VERSION:-1.0}
      - APP_COLOR=green
    ports:
      - "8002:8000"
    restart: always

  nginx:
    image: nginx:alpine
    container_name: nginx_lb
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app_blue
      - app_green
    restart: always
