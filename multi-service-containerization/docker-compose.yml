version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: appdb
    volumes:
      - db-data:/var/lib/postgresql/data

  api:
    image: multi-service-app-api
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgres://user:password@db:5432/appdb
    depends_on:
      - db

  frontend:
    image: multi-service-app-frontend
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  db-data:
